  <link rel="stylesheet" href="style.css" />

<body>
  <header class="site-header">
    <h1 class="site-title">Fotografi Sederhana</h1>
    <nav class="nav-bar" aria-label="Navigasi utama">
      <a class="nav-link" href="index.html">Beranda</a>
      <a class="nav-link" href="profil.html">Profil</a>
      <a class="nav-link" href="galeri.html">Galeri</a>
      <a class="nav-link" href="artikel.html">Artikel</a>
      <a class="nav-link" href="kontak.html">Kontak</a>
    </nav>
  </header>

  <main class="container">
    <section aria-labelledby="gallery-title">
      <h2 id="gallery-title">Galeri</h2>
      <p style="max-width: 840px; margin: 6px auto 18px; color:#dbe7ff;">
        Berikut beberapa contoh foto dengan komposisi sederhana.
      </p>

<div class="gallery-grid" role="list">
        <figure class="gallery-card" role="listitem">
          <img src="mountain.jpg" alt="Foto gunung" />
          <figcaption class="gallery-caption">1. Senja di pegunungan</figcaption>
        </figure>

        <figure class="gallery-card" role="listitem">
          <img src="bali.jpg" alt="Foto pemandangan" />
          <figcaption class="gallery-caption">2. Pemandangan alam yang tenang</figcaption>
        </figure>

        <figure class="gallery-card" role="listitem">
          <img src="food.jpg" alt="Foto makanan" />
          <figcaption class="gallery-caption">3. Detail hidangan sederhana</figcaption>
        </figure>

        <figure class="gallery-card" role="listitem">
          <img src="art.jpg" alt="Foto karya" />
          <figcaption class="gallery-caption">4. Tekstur & warna pada karya</figcaption>
        </figure>
      </div>
    </section>
  </main>
